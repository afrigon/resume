name: deploy
run-name: "Terraform deploy (${{ github.ref_name }})"

on:
  push:
    tags:
      - "*"

permissions:
  id-token: write
  contents: read

env:
  AWS_REGION: us-east-1
  AWS_ROLE: arn:aws:iam::944671670298:role/terraform-resume
  NODE_VERSION: 24

jobs:
  terraform:
    runs-on: ubuntu-latest
    outputs:
      bucket: ${{ steps.outputs.outputs.bucket }}
      distribution_id: ${{ steps.outputs.outputs.distribution_id }}
    steps:
      - uses: actions/checkout@v6

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v6
        with:
          aws-region: ${{ env.AWS_REGION }}
          role-to-assume: ${{ env.AWS_ROLE }}
          role-session-name: resume-ci-session

      - uses: hashicorp/setup-terraform@v4

      - name: Apply
        working-directory: ./terraform
        run: |
          terraform init
          terraform plan -out=planout
          terraform apply planout

      - name: Outputs
        id: outputs
        working-directory: ./terraform
        run: |
          echo "bucket=$(terraform output -raw bucket)" >> "$GITHUB_OUTPUT"
          echo "distribution_id=$(terraform output -raw distribution_id)" >> "$GITHUB_OUTPUT"

  deploy:
    runs-on: ubuntu-latest
    needs: terraform
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install Dependencies
        run: npm ci

      - name: Build Project
        run: npm run build

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v6
        with:
          aws-region: ${{ env.AWS_REGION }}
          role-to-assume: ${{ env.AWS_ROLE }}
          role-session-name: resume-ci-session

      - name: Sync Content
        run: aws s3 sync ./dist "s3://${{ needs.terraform.outputs.bucket }}" --delete --cache-control "public, max-age=2592000"

      - name: Invalidate Cache
        run: aws cloudfront create-invalidation --distribution-id "${{ needs.terraform.outputs.distribution_id }}" --paths "/*"
